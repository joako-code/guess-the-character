<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GuessWho</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/@picocss/pico@1/css/pico.min.css"
    />
  </head>
  <body>
    <header class="container">
      <h1>Guess the character</h1>
    </header>

    <main class="container">
      <section id="view-home">
        <div id="info">Score: 0</div>
        <h3>Choose your theme:</h3>
        <div class="grid-themes">
          <div class="item-themes">
            <h3>Pokemon</h3>
            <button data-theme="pokemon">Jugar</button>
          </div>
          <div class="item-themes">
            <h3>Mortal Kombat</h3>
            <button data-theme="mortal-kombat">Jugar</button>
          </div>
          <div class="item-themes">
            <h3>Dragon Ball</h3>
            <button data-theme="dragon-ball">Jugar</button>
          </div>
        </div>
      </section>

      <section id="view-game" style="display: none">
        <button id="btn-back" class="outline secondary">⬅ Volver</button>
        <div id="game-content"></div>
      </section>
    </main>

    <script type="module" src="js/main.js"></script>
  </body>
</html>
